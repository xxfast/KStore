name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check api
        run: ./gradlew apiCheck

      - name: Generate kover coverage report
        run: ./gradlew koverXmlReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: kstore/build/reports/kover/report.xml
          # Public repo: uploads are tokenless, so this also works on fork PRs.
          # CODECOV_TOKEN (if set as a secret) is used for same-repo runs.
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    strategy:
      matrix:
        config: [
          # A macOS host is the only one that can run Apple-target tests, and it runs JVM/JS/Wasm
          # tests just as well — so everything except the native Linux/Windows tests runs here.
          { target: macos, os: macos-latest, tasks: iosSimulatorArm64Test macosArm64Test testAndroidHostTest desktopTest jsTest wasmJsTest },
          # Native Linux/Windows test binaries can only be executed on their own host.
          { target: linux, os: ubuntu-latest, tasks: linuxX64Test },
          { target: windows, os: windows-latest, tasks: windowsTest },
        ]
    runs-on: ${{ matrix.config.os }}
    name: Build ${{ matrix.config.target }}
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test ${{ matrix.config.target }} targets
        run: ./gradlew ${{ matrix.config.tasks }}

      - name: Upload test results to Codecov
        # Run even when tests fail — that's when test analytics is most useful.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: "**/build/test-results/**/TEST-*.xml"
          flags: ${{ matrix.config.target }}
          # Public repo: uploads are tokenless, so this also works on fork PRs.
          # CODECOV_TOKEN (if set as a secret) is used for same-repo runs.
          token: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: ${{ matrix.registry.name }}
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-latest # required to build the Apple-target klibs
    needs:
      - build
    permissions:
      contents: read
      packages: write # for GitHub Packages
    strategy:
      # Don't let one registry failing cancel the upload to the other.
      fail-fast: false
      matrix:
        registry:
          # Uploads all three modules as a single Central Portal deployment. Without
          # automaticRelease, it waits for manual approval at central.sonatype.com.
          - name: Publish to Maven Central
            task: publishToMavenCentral
          - name: Publish to GitHub Packages
            task: publishAllPublicationsToGitHubPackagesRepository
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ${{ matrix.registry.name }}
        run: ./gradlew ${{ matrix.registry.task }} --no-configuration-cache
        env:
          # Maven Central credentials (ignored by the GitHub Packages task, and vice versa).
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_SECRET }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          # GitHub Packages credentials — GITHUB_TOKEN is auto-provided, no secret needed.
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  documentation:
    name: Publish documentation
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate api docs with dokka
        run: ./gradlew dokkaGenerate

      - name: Build Writerside docs using Docker
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: docs/kstore
          artifact: webHelpKSTORE2-all.zip
          docker-version: 232.10275

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            artifacts/webHelpKSTORE2-all.zip
            artifacts/report.json
          retention-days: 7

      - name: Unzip artifact
        run: |
          unzip -qq artifacts/webHelpKSTORE2-all.zip -d build/docs

      - name: Move dokka api-doc to docs/api
        run: |
          sudo mkdir -p build/docs/api
          sudo mv build/dokka/html/* build/docs/api

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/build/docs

      - name: Release to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
